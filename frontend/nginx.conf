server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API: o trailing slash em proxy_pass remove o prefixo /api antes de
  # encaminhar (ex: /api/tickets/123 → /tickets/123 no backend).
  location /api/ {
    proxy_pass http://backend:8080/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: rotas client-side (/tickets, /tickets/:id, /dashboard)
  # caem no index.html para o Angular Router resolver.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets imutáveis (Angular usa output hashing).
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
