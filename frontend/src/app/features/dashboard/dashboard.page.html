<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Dashboard</h1>
    <p class="mt-1 text-sm text-slate-500">Métricas dos últimos 7 dias.</p>
  </header>

  @if (loading()) {
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      @for (n of [1, 2, 3, 4]; track n) {
        <app-skeleton height="6rem" />
      }
    </div>
    <div class="grid gap-4 lg:grid-cols-3">
      <app-skeleton height="18rem" width="100%" />
      <app-skeleton height="18rem" width="100%" />
    </div>
  } @else if (data()) {
    @if (data(); as m) {
    <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">

      <app-metric-card label="Total" [value]="total(m)" />
      <app-metric-card label="Abertos" [value]="m.byStatus.OPEN" />
      <app-metric-card label="Em andamento" [value]="m.byStatus.IN_PROGRESS" />
      <app-metric-card label="Fechados" [value]="m.byStatus.CLOSED" />
    </section>

    <section class="grid gap-4 lg:grid-cols-3">
      <app-card class="lg:col-span-2">
        <div class="px-5 py-4">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">
            Evolução diária
          </h2>
          <div class="mt-4 h-64">
            <app-daily-chart [series]="m.dailyEvolution" />
          </div>
        </div>
      </app-card>

      <app-card>
        <div class="px-5 py-4">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">
            Top 5 categorias
          </h2>
          <div class="mt-4">
            <app-top-categories [categories]="m.topCategories" />
          </div>
        </div>
      </app-card>
    </section>
    }
  }
</div>
